            <p class="text-gray-600 dark:text-gray-400 max-w-xl mx-auto">اختر جهازين من القائمة وسيقوم الذكاء الاصطناعي بمقارنة المواصفات الدقيقة وإعطائك الخلاصة.</p>

            <div class="mb-8 p-4 bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-700 rounded-lg">

            </div>

                    <select id="modelA" class="w-full p-2 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white" disabled><option value="">اختر الموديل</option></select>
                </div>
                <div class="p-4 bg-gray-50 dark:bg-gray-900/50 rounded-xl border border-gray-200 dark:border-gray-700">
                    <h3 class="font-bold text-gray-900 dark:text-white mb-3 text-center">الطرف الثاني (ب)</h3>
                    <select id="brandB" class="w-full p-2 mb-2 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white"><option value="">اختر الشركة</option></select>
                    <select id="modelB" class="w-full p-2 rounded border border-gray-300 dark:border-gray-600 dark:bg-gray-800 dark:text-white" disabled><option value="">اختر الموديل</option></select>
                </div>
            </div>
            <div id="manualArea" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 hidden">
                <div><label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">المنتج الأول</label><input type="text" id="manualItem1" placeholder="مثال: PlayStation 5" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white" /></div>
                <div><label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">المنتج الثاني</label><input type="text" id="manualItem2" placeholder="مثال: Xbox Series X" class="w-full p-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white" /></div>
            </div>
            <button id="analyzeBtn" class="w-full py-4 bg-gradient-to-r from-orange-600 to-red-500 hover:from-orange-700 hover:to-red-600 text-white font-bold rounded-xl shadow-lg transform active:scale-95 transition-all flex items-center justify-center gap-2"><i data-lucide="sparkles" class="w-5 h-5"></i><span>مقارنة وتحليل الآن</span></button>
            <div id="resultArea" class="mt-8 hidden">

                <div id="markdownOutput" class="prose dark:prose-invert max-w-none text-gray-700 dark:text-gray-300 bg-gray-50 dark:bg-gray-900/50 p-6 rounded-xl border border-gray-200 dark:border-gray-700 min-h-[200px]"></div>

                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-800 hover:bg-[#E4405F] hover:text-white transition-all border border-gray-700"><i data-lucide="instagram" class="w-5 h-5"></i></a>
                <a href="#" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-800 hover:bg-black hover:border-gray-600 hover:text-white transition-all border border-gray-700"><svg class="w-5 h-5 fill-current" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg></a>

    <script src="assets/js/app.js"></script>
    <script type="module">
        import { GoogleGenAI } from "@google/genai";
        import { phonesDatabase } from "./assets/js/phones-data.js";
        const modeSelectBtn = document.getElementById('modeSelect'); const modeManualBtn = document.getElementById('modeManual'); const selectionArea = document.getElementById('selectionArea'); const manualArea = document.getElementById('manualArea'); const brandA = document.getElementById('brandA'); const modelA = document.getElementById('modelA'); const brandB = document.getElementById('brandB'); const modelB = document.getElementById('modelB'); const analyzeBtn = document.getElementById('analyzeBtn'); const apiKeyInput = document.getElementById('apiKeyInput'); const resultArea = document.getElementById('resultArea'); const markdownOutput = document.getElementById('markdownOutput'); const loader = document.getElementById('loader'); let currentMode = 'select';
        function populateBrands() { const brands = phonesDatabase.map(b => b.brand); [brandA, brandB].forEach(select => { select.innerHTML = '<option value="">اختر الشركة</option>'; brands.forEach(brand => { const option = document.createElement('option'); option.value = brand; option.textContent = brand; select.appendChild(option); }); }); }
        function handleBrandChange(brandSelect, modelSelect) { const selectedBrand = brandSelect.value; modelSelect.innerHTML = '<option value="">اختر الموديل</option>'; modelSelect.disabled = true; if (selectedBrand) { const brandData = phonesDatabase.find(b => b.brand === selectedBrand); if (brandData) { brandData.phones.forEach(phone => { const option = document.createElement('option'); option.value = phone.id; option.textContent = phone.name; modelSelect.appendChild(option); }); modelSelect.disabled = false; } } }
        brandA.addEventListener('change', () => handleBrandChange(brandA, modelA)); brandB.addEventListener('change', () => handleBrandChange(brandB, modelB));
        modeSelectBtn.addEventListener('click', () => { currentMode = 'select'; selectionArea.classList.remove('hidden'); manualArea.classList.add('hidden'); modeSelectBtn.classList.add('bg-orange-600', 'text-white'); modeSelectBtn.classList.remove('bg-gray-200', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-300'); modeManualBtn.classList.remove('bg-orange-600', 'text-white'); modeManualBtn.classList.add('bg-gray-200', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-300'); });
        modeManualBtn.addEventListener('click', () => { currentMode = 'manual'; selectionArea.classList.add('hidden'); manualArea.classList.remove('hidden'); modeManualBtn.classList.add('bg-orange-600', 'text-white'); modeManualBtn.classList.remove('bg-gray-200', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-300'); modeSelectBtn.classList.remove('bg-orange-600', 'text-white'); modeSelectBtn.classList.add('bg-gray-200', 'dark:bg-gray-700', 'text-gray-700', 'dark:text-gray-300'); });
        populateBrands();
        analyzeBtn.addEventListener('click', async () => {
            let apiKey = apiKeyInput.value.trim(); if (!apiKey && window.process && window.process.env.API_KEY) { apiKey = window.process.env.API_KEY; } if (!apiKey) { alert("يرجى إدخال مفتاح API للمتابعة."); return; } window.process.env.API_KEY = apiKey;
            let prompt = "";
            if (currentMode === 'select') { const idA = modelA.value; const idB = modelB.value; if (!idA || !idB) { alert("يرجى اختيار هاتفين للمقارنة."); return; } let phoneA, phoneB; phonesDatabase.forEach(brand => { const foundA = brand.phones.find(p => p.id === idA); if (foundA) phoneA = foundA; const foundB = brand.phones.find(p => p.id === idB); if (foundB) phoneB = foundB; }); prompt = `تصرف كخبير تقني محترف. قم بعمل مقارنة تفصيلية بين الهاتفين التاليين بناءً على المواصفات المرفقة ومعلوماتك:\nالهاتف الأول: ${phoneA.name}\nالمواصفات: ${JSON.stringify(phoneA.specs)}\nالهاتف الثاني: ${phoneB.name}\nالمواصفات: ${JSON.stringify(phoneB.specs)}\nالمطلوب:\n1. جدول مقارنة سريع.\n2. نقاط تفوق ${phoneA.name}.\n3. نقاط تفوق ${phoneB.name}.\n4. الحكم النهائي: أيهما أفضل ولماذا؟`; } else { const item1 = document.getElementById('manualItem1').value.trim(); const item2 = document.getElementById('manualItem2').value.trim(); if (!item1 || !item2) { alert("يرجى كتابة اسم المنتجين."); return; } prompt = `تصرف كخبير تقني. قارن بين:\nالطرف الأول: ${item1}\nالطرف الثاني: ${item2}\nالمقارنة يجب أن تشمل المواصفات، المميزات، العيوب، والخلاصة.`; }
            resultArea.classList.remove('hidden'); markdownOutput.innerHTML = ''; loader.classList.remove('hidden'); analyzeBtn.disabled = true; analyzeBtn.classList.add('opacity-50', 'cursor-not-allowed');
            try { const ai = new GoogleGenAI({ apiKey: window.process.env.API_KEY }); const response = await ai.models.generateContent({ model: 'gemini-2.5-flash-latest', contents: prompt }); const text = response.text; const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold mt-6 mb-3 text-orange-600 border-b border-gray-200 pb-1">$1</h2>').replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold mt-4 mb-2 text-gray-800 dark:text-white">$1</h3>').replace(/\n/g, '<br>'); loader.classList.add('hidden'); markdownOutput.innerHTML = formattedText; } catch (error) { console.error("Error:", error); loader.classList.add('hidden'); markdownOutput.innerHTML = `<p class="text-red-500 font-bold">حدث خطأ. تأكد من مفتاح API.<br>${error.message}</p>`; } finally { analyzeBtn.disabled = false; analyzeBtn.classList.remove('opacity-50', 'cursor-not-allowed'); }
        });
    </script>
